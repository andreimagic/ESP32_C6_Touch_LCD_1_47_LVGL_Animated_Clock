<h2>🔧 Hardware</h2>

<ul>
<li>ESP32-C6 Waveshare board</li>
<li>ST7789 display</li>
<li>AXS5106L touch</li>
<li>QMI8658 IMU</li>
</ul>

<h3>Pinout</h3>
<ul>
<li>SPI SCK → GPIO1</li>
<li>MOSI → GPIO2</li>
<li>MISO → GPIO3</li>
<li>Display CS → GPIO14</li>
<li>Buzzer → GPIO5</li>
</ul>
